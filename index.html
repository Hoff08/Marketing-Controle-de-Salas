<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Marketing - Colégio Conhecimento</title>

    <!-- ÍCONE PARA A ABA DO NAVEGADOR -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- ÍCONE PARA IPHONE/IOS (TELA INICIAL) -->
    <link rel="apple-touch-icon" href="logo.png">
    
    <!-- CONFIGURAÇÃO PARA ANDROID/CHROME (TELA INICIAL) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MKT Conhecimento">

    <style>
        :root {
            --primary-red: #9c0c11;
            --primary-green: #00a859;
            --white: #ffffff;
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: var(--primary-red);
            color: var(--white);
            padding: 1rem;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--primary-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        header img {
            height: 50px; /* Logo pequena no topo */
        }

        header h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; }

        main {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .rooms-section { flex: 2; }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .room-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 5px solid #ccc;
            transition: all 0.3s ease;
        }

        .room-card.recorded { border-top-color: var(--primary-green); background-color: #f9fff9; }
        .room-card h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--primary-red); }
        .room-card p { margin: 0 0 10px 0; font-size: 0.85rem; color: #666; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .btn-Vicenzo { background-color: var(--primary-green); color: white; }
        .btn-maria { background-color: var(--primary-red); color: white; }
        .btn-reset { background-color: #444; color: white; margin-top: 10px; width: 100%; font-size: 0.7rem; }

        .sidebar {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            border-top: 5px solid var(--primary-red);
        }

        .activity-form { display: flex; flex-direction: column; gap: 10px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .btn-add { background-color: var(--primary-red); color: white; padding: 12px; margin-top: 5px; }

        .activities-list { list-style: none; padding: 0; margin-top: 20px; }
        
        .activity-item {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 6px solid var(--primary-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .period-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eee;
            margin-bottom: 5px;
            display: inline-block;
        }
        
        .assign-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .assign-btns { display: flex; gap: 5px; margin-top: 5px; }
        .btn-small { padding: 6px; font-size: 0.65rem; flex: 1; }

        .assigned-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            width: 100%;
            text-align: center;
        }

        .delete-act { position: absolute; right: 10px; top: 10px; color: #ccc; cursor: pointer; font-size: 1.2rem; }

        @media (max-width: 768px) {
            main { flex-direction: column; }
            .sidebar { position: static; order: -1; width: 100%; box-sizing: border-box;}
            header h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo">
    <h1>Marketing Conhecimento - <span id="displayDate"></span></h1>
</header>

<main>
    <section class="rooms-section">
        <div class="rooms-grid" id="roomsGrid"></div>
    </section>

    <aside class="sidebar">
        <h2 style="margin-top:0; font-size: 1.2rem; color: var(--primary-red);">Agendar Atividade</h2>
        <div class="activity-form">
            <input type="text" id="actTitle" placeholder="Título da Atividade / Turma">
            <select id="actRoomSelect"></select>
            <select id="actTimeSelect">
                <option value="">Selecione o Horário</option>
                <optgroup label="MATUTINO" id="optMatutino"></optgroup>
                <optgroup label="VESPERTINO" id="optVespertino"></optgroup>
            </select>
            <button class="btn-add" id="btnAddActivity">Confirmar Agendamento</button>
        </div>
        
        <h3 style="margin: 20px 0 10px 0; font-size: 1rem; color: #666; border-bottom: 1px solid #eee;">Agenda do Dia:</h3>
        <ul class="activities-list" id="activitiesList"></ul>
    </aside>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYdUm51PqF3YUhRKp7HRyYCQMo8BDFue8",
    authDomain: "conhecimento-marketing.firebaseapp.com",
    databaseURL: "https://conhecimento-marketing-default-rtdb.firebaseio.com",
    projectId: "conhecimento-marketing",
    storageBucket: "conhecimento-marketing.firebasestorage.app",
    messagingSenderId: "555927054528",
    appId: "1:555927054528:web:82cb8bfde157e986c16525",
    measurementId: "G-59Q4HXE2DZ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const salasMapa = [
      { id: "311", label: "311 (Turmas 11/14)" }, { id: "312", label: "312 (Turmas 21/13)" },
      { id: "313", label: "313 (Turmas 22/15)" }, { id: "314", label: "314 (Turmas 51/53)" },
      { id: "320", label: "320 (Turma 81)" }, { id: "321", label: "321 (Turma 62)" },
      { id: "322", label: "322 (Turmas 72/23)" }, { id: "323", label: "323 (Turmas 61/24)" },
      { id: "324", label: "324 (Turma 92)" }, { id: "325", label: "325 (Turmas 52/54)" },
      { id: "326", label: "326 (Turmas 32/34)" }, { id: "327", label: "327 (Turmas 31/33)" },
      { id: "328", label: "328 (Turmas 41/43)" }, { id: "329", label: "329 (Turmas 42/44)" },
      { id: "330", label: "330 (Turma 82)" }, { id: "331", label: "331 (Turma 202)" },
      { id: "332", label: "332 (Turma 201)" }, { id: "333", label: "333 (Turma 301)" },
      { id: "334", label: "334 (Turma 302)" }, { id: "335", label: "335 (Turmas 101/73)" },
      { id: "336", label: "336 (Turmas 93/83)" }, { id: "337", label: "337 (Turmas 71/63)" },
      { id: "338", label: "338 (Turmas 91/64)" }, { id: "339", label: "339 (Turma 102)" }
  ];

  const hMatutino = ["07:30", "08:00", "08:20", "08:40", "09:00", "09:20", "09:40", "10:00", "10:20", "10:40", "11:00", "11:20"];
  const hVespertino = ["13:15", "13:30", "13:50", "14:10", "14:30", "14:50", "15:10", "15:30", "15:50", "16:10", "16:30", "16:50"];

  const roomsRef = ref(db, 'rooms');
  const activitiesRef = ref(db, 'activities');
  const metadataRef = ref(db, 'metadata');

  onValue(ref(db, 'metadata/lastReset'), (snapshot) => {
      const today = new Date().toLocaleDateString();
      const lastReset = snapshot.val();
      document.getElementById('displayDate').innerText = today;
      if (lastReset && lastReset !== today) {
          set(roomsRef, null); set(activitiesRef, null);
          set(metadataRef, { lastReset: today });
      } else if (!lastReset) set(metadataRef, { lastReset: today });
  });

  onValue(roomsRef, (snapshot) => {
      const data = snapshot.val() || {};
      const grid = document.getElementById('roomsGrid');
      grid.innerHTML = '';
      salasMapa.forEach(sala => {
          const recordedBy = data[sala.id];
          grid.innerHTML += `
                <div class="room-card ${recordedBy ? 'recorded' : ''}">
                    <h3>Sala ${sala.id}</h3>
                    <p>${sala.label}</p>
                    ${!recordedBy ? `
                        <div class="btn-group">
                            <button class="btn-Vicenzo action-record" data-id="${sala.id}" data-user="Vicenzo">Vicenzo</button>
                            <button class="btn-maria action-record" data-id="${sala.id}" data-user="Maria">Maria</button>
                        </div>
                    ` : `
                        <div style="text-align:center; font-weight:bold; color:var(--primary-green);">
                            ✅ POR: ${recordedBy.toUpperCase()}
                            <button class="btn-reset action-reset" data-id="${sala.id}">Resetar</button>
                        </div>
                    `}
                </div>`;
      });
      document.querySelectorAll('.action-record').forEach(b => b.onclick = () => set(ref(db, 'rooms/' + b.dataset.id), b.dataset.user));
      document.querySelectorAll('.action-reset').forEach(b => b.onclick = () => remove(ref(db, 'rooms/' + b.dataset.id)));
  });

  onValue(activitiesRef, (snapshot) => {
      const data = snapshot.val() || {};
      const listEl = document.getElementById('activitiesList');
      const optMat = document.getElementById('optMatutino');
      const optVesp = document.getElementById('optVespertino');
      
      listEl.innerHTML = ''; optMat.innerHTML = ''; optVesp.innerHTML = '';
      const activitiesArray = Object.entries(data).map(([key, value]) => ({ id: key, ...value }));
      
      const renderTimeOption = (h, container) => {
          if (!activitiesArray.some(a => a.time === h)) container.innerHTML += `<option value="${h}">${h}</option>`;
      }
      hMatutino.forEach(h => renderTimeOption(h, optMat));
      hVespertino.forEach(h => renderTimeOption(h, optVesp));

      activitiesArray.sort((a,b) => a.time.localeCompare(b.time)).forEach(act => {
          const isVesp = hVespertino.includes(act.time);
          listEl.innerHTML += `
                <li class="activity-item">
                    <span class="delete-act" onclick="confirmRemove('${act.id}')">×</span>
                    <span class="period-badge">${isVesp ? 'VESPERTINO' : 'MATUTINO'}</span>
                    <strong>${act.title}</strong>
                    <span style="font-size:0.9rem">Sala: ${act.room} | 🕒 ${act.time}</span>
                    <div class="assign-section">
                        ${!act.assignedTo ? `
                            <div class="assign-btns">
                                <button class="btn-Vicenzo btn-small action-assign" data-id="${act.id}" data-user="Vicenzo">Vicenzo</button>
                                <button class="btn-maria btn-small action-assign" data-id="${act.id}" data-user="Maria">Maria</button>
                            </div>
                        ` : `
                            <div class="assigned-tag" style="background-color: ${act.assignedTo === 'Vicenzo' ? 'var(--primary-green)' : 'var(--primary-red)'}">
                                CONFIRMADO: ${act.assignedTo}
                            </div>
                            <center><button class="action-assign" data-id="${act.id}" data-user="" style="background:none; color:#999; border:none; font-size:0.6rem; cursor:pointer;">MUDAR</button></center>
                        `}
                    </div>
                </li>`;
      });
      document.querySelectorAll('.action-assign').forEach(b => b.onclick = () => update(ref(db, 'activities/' + b.dataset.id), { assignedTo: b.dataset.user || null }));
  });

  window.confirmRemove = (id) => { if(confirm("Remover?")) remove(ref(db, 'activities/' + id)); };

  document.getElementById('btnAddActivity').onclick = () => {
      const title = document.getElementById('actTitle').value;
      const room = document.getElementById('actRoomSelect').value;
      const time = document.getElementById('actTimeSelect').value;
      if (title && room && time) {
          push(activitiesRef, { title, room, time, assignedTo: null });
          document.getElementById('actTitle').value = '';
      } else alert("Preencha tudo!");
  };

  const selectSala = document.getElementById('actRoomSelect');
  selectSala.innerHTML = '<option value="">Selecione a Sala</option>';
  salasMapa.forEach(sala => selectSala.innerHTML += `<option value="${sala.id}">${sala.label}</option>`);

</script>
</body>
</html>
